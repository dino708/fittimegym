{% extends 'base.html' %}
{% block auth_content %}
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-box{width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2rem}
</style>
<div class="auth-wrap">
<div class="auth-box">
  <div style="font-size:20px;font-weight:800;margin-bottom:4px">📝 Daftar Member Baru</div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">FitTime Scheduler</div>
  {% with msgs=get_flashed_messages(with_categories=true) %}
  {% for cat,msg in msgs %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="fgroup"><label>Nama Lengkap *</label><input name="nama_lengkap" type="text" required placeholder="Nama lengkap Anda" /></div>
    <div class="fgroup"><label>Username *</label><input name="username" type="text" required placeholder="Tidak boleh ada spasi" /></div>
    <div class="fgroup"><label>Email</label><input name="email" type="email" placeholder="email@contoh.com" /></div>
    <div class="fgroup"><label>Password * <span style="color:var(--text3)">(min. 6 karakter)</span></label><input name="password" type="password" required placeholder="••••••" /></div>
    <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:4px">✅ Daftar Sekarang</button>
  </form>
  <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--text2)">Sudah punya akun? <a href="{{ url_for('login') }}">Login</a></p>
</div>
</div>
{% endblock %}
